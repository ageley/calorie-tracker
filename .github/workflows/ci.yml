name: CI

on:
  pull_request:
    types:
      - opened
      - synchronize
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

jobs:
  test-and-snapshot-image:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: 25
      - name: Run tests
        run: ./gradlew test
      - name: Build jar
        run: ./gradlew bootJar
      - name: Read application version
        id: version
        run: echo "app_version=$(./gradlew -q printAppVersion)" >> "$GITHUB_OUTPUT"
      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build snapshot image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: ${{ github.event_name == 'push' }}
          tags: ghcr.io/${{ github.repository }}:${{ steps.version.outputs.app_version }}-${{ github.run_number }}
