name: Claude Code Review
on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
jobs:
  claude-review:
    if: |
      (github.actor == 'ageley' || github.actor == 'claude') &&
      (github.triggering_actor == 'ageley' || github.triggering_actor == 'claude') &&
      (github.event.pull_request.user.login == 'ageley' || github.event.pull_request.user.login == 'claude')
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review medium --comment --fix ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
