name: Main Release

on:
  push:
    branches:
      - main

permissions:
  contents: write
  packages: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v5
      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: liberica
          java-version: 25
      - name: Run unit tests
        run: ./gradlew test
      - name: Build jar
        run: ./gradlew bootJar
      - name: Read application version
        id: version
        run: echo "app_version=$(./gradlew -q printAppVersion)" >> "$GITHUB_OUTPUT"
      - name: Prepare Docker metadata
        id: metadata
        uses: docker/metadata-action@v6
        with:
          images: ghcr.io/${{ github.repository }}
          tags: type=raw,value=${{ steps.version.outputs.app_version }}
      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.metadata.outputs.tags }}
          labels: ${{ steps.metadata.outputs.labels }}
      - name: Tag main commit
        uses: rickstaa/action-create-tag@v1.7.2
        with:
          tag: ${{ steps.version.outputs.app_version }}
          message: Release ${{ steps.version.outputs.app_version }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
